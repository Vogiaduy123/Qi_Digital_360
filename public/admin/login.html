<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập — Virtual Tour Qi</title>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/auth-guard.js"></script>
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary-color: #4f46e5;
      --primary-hover: #4338ca;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      position: relative;
      overflow: hidden;
    }

    /* Abstract background shapes */
    .bg-circle-1 {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79, 70, 229, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
      top: -10%;
      left: -10%;
      z-index: 1;
    }

    .bg-circle-2 {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
      bottom: -15%;
      right: -10%;
      z-index: 1;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
      position: relative;
      z-index: 10;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    }

    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-container img {
      max-height: 50px;
      margin-bottom: 15px;
    }

    .logo-container h2 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 5px;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-container p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .form-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .form-control {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      color: #fff;
      padding: 12px 16px;
      font-size: 15px;
      transition: all 0.2s ease;
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.25);
      color: #fff;
    }

    .btn-login {
      background: var(--primary-color);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: 600;
      padding: 14px;
      font-size: 15px;
      width: 100%;
      margin-top: 15px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }

    .btn-login:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .error-banner {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .forgot-link {
      color: var(--text-muted);
      font-size: 13px;
      text-decoration: none;
      display: inline-block;
      margin-top: 15px;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: #a5b4fc;
    }

    .footer-text {
      text-align: center;
      margin-top: 30px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="bg-circle-1" aria-hidden="true"></div>
  <div class="bg-circle-2" aria-hidden="true"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo-container">
        <img src="/images/logo-qi.png" alt="Qi Logo" onerror="this.src='https://raw.githubusercontent.com/Vogiaduy123/Qi_Digital_360/main/public/images/logo-qi.png'">
        <h2>Virtual Tour Qi</h2>
        <p>Đăng nhập trang quản trị dự án</p>
      </div>

      <div class="error-banner" id="errorBanner" role="alert">
        <span>⚠️</span>
        <span id="errorMessage">Đăng nhập thất bại</span>
      </div>

      <form id="loginForm">
        <div class="mb-3">
          <label for="username" class="form-label">Tên đăng nhập</label>
          <input type="text" class="form-control" id="username" required autocomplete="username" placeholder="Nhập tên đăng nhập">
        </div>
        <div class="mb-4">
          <div class="d-flex justify-content-between align-items-center">
            <label for="password" class="form-label">Mật khẩu</label>
          </div>
          <input type="password" class="form-control" id="password" required autocomplete="current-password" placeholder="Nhập mật khẩu">
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Đăng nhập</button>
      </form>

      <div class="text-center">
        <a href="#" class="forgot-link" id="forgotBtn">Quên mật khẩu?</a>
        <div style="margin-top: 10px;">
          <a href="/admin/register.html" class="forgot-link" style="margin-top: 0; color: #a5b4fc;">Chưa có tài khoản? Đăng ký ngay</a>
        </div>
      </div>
    </div>
    
    <div class="footer-text">
      Qi Technologies · Virtual Tour Manager
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');
      const errorBanner = document.getElementById('errorBanner');
      const errorMessage = document.getElementById('errorMessage');

      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      errorBanner.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Đang xử lý...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          if (data.user && data.user.role === 'user') {
            window.location.href = '/';
          } else {
            window.location.href = '/admin/index.html';
          }
        } else {
          errorBanner.style.display = 'flex';
          errorMessage.textContent = data.error || 'Tên đăng nhập hoặc mật khẩu không chính xác';
          loginBtn.disabled = false;
          loginBtn.textContent = 'Đăng nhập';
        }
      } catch (err) {
        console.error('Login error:', err);
        errorBanner.style.display = 'flex';
        errorMessage.textContent = 'Không thể kết nối đến máy chủ. Vui lòng thử lại sau.';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Đăng nhập';
      }
    });

    document.getElementById('forgotBtn').addEventListener('click', function(e) {
      e.preventDefault();
      alert('Vui lòng liên hệ Quản trị viên hệ thống để khôi phục hoặc đặt lại mật khẩu.');
    });
  </script>
</body>
</html>
