<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khởi tạo hệ thống — Virtual Tour Qi</title>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/auth-guard.js"></script>
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary-color: #10b981;
      --primary-hover: #059669;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      position: relative;
      overflow: hidden;
    }

    .bg-circle-1 {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
      top: -10%;
      left: -10%;
      z-index: 1;
    }

    .bg-circle-2 {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
      bottom: -15%;
      right: -10%;
      z-index: 1;
    }

    .setup-container {
      width: 100%;
      max-width: 480px;
      padding: 20px;
      position: relative;
      z-index: 10;
    }

    .setup-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    }

    .logo-container {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo-container img {
      max-height: 50px;
      margin-bottom: 15px;
    }

    .logo-container h2 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 5px;
      background: linear-gradient(135deg, #fff 0%, #34d399 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-container p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .form-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .form-control {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      color: #fff;
      padding: 10px 14px;
      font-size: 15px;
      transition: all 0.2s ease;
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.25);
      color: #fff;
    }

    .btn-setup {
      background: var(--primary-color);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: 600;
      padding: 12px;
      font-size: 15px;
      width: 100%;
      margin-top: 15px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-setup:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
    }

    .error-banner {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .footer-text {
      text-align: center;
      margin-top: 30px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="bg-circle-1" aria-hidden="true"></div>
  <div class="bg-circle-2" aria-hidden="true"></div>

  <div class="setup-container">
    <div class="setup-card">
      <div class="logo-container">
        <img src="/images/logo-qi.png" alt="Qi Logo" onerror="this.src='https://raw.githubusercontent.com/Vogiaduy123/Qi_Digital_360/main/public/images/logo-qi.png'">
        <h2>Khởi tạo Hệ thống</h2>
        <p>Tạo tài khoản Quản trị viên (Admin) đầu tiên</p>
      </div>

      <div class="error-banner" id="errorBanner" role="alert">
        <span>⚠️</span>
        <span id="errorMessage">Khởi tạo thất bại</span>
      </div>

      <form id="setupForm">
        <div class="mb-3">
          <label for="username" class="form-label">Tên đăng nhập (Username)</label>
          <input type="text" class="form-control" id="username" required minlength="3" placeholder="Ví dụ: admin">
        </div>
        <div class="mb-3">
          <label for="displayName" class="form-label">Tên hiển thị (Display Name)</label>
          <input type="text" class="form-control" id="displayName" required placeholder="Ví dụ: Quản trị viên">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Mật khẩu</label>
          <input type="password" class="form-control" id="password" required minlength="6" placeholder="Tối thiểu 6 ký tự">
        </div>
        <div class="mb-4">
          <label for="confirmPassword" class="form-label">Xác nhận mật khẩu</label>
          <input type="password" class="form-control" id="confirmPassword" required placeholder="Nhập lại mật khẩu">
        </div>
        <button type="submit" class="btn-setup" id="setupBtn">Tạo tài khoản Admin</button>
      </form>
    </div>
    
    <div class="footer-text">
      Qi Technologies · Virtual Tour Manager
    </div>
  </div>

  <script>
    document.getElementById('setupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const usernameInput = document.getElementById('username');
      const displayNameInput = document.getElementById('displayName');
      const passwordInput = document.getElementById('password');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const setupBtn = document.getElementById('setupBtn');
      const errorBanner = document.getElementById('errorBanner');
      const errorMessage = document.getElementById('errorMessage');

      const username = usernameInput.value.trim();
      const displayName = displayNameInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      errorBanner.style.display = 'none';

      if (password !== confirmPassword) {
        errorBanner.style.display = 'flex';
        errorMessage.textContent = 'Mật khẩu xác nhận không khớp.';
        return;
      }

      setupBtn.disabled = true;
      setupBtn.textContent = 'Đang khởi tạo...';

      try {
        const response = await fetch('/api/auth/setup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, displayName, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          alert('Khởi tạo tài khoản Admin thành công! Vui lòng đăng nhập.');
          window.location.href = '/admin/login.html';
        } else {
          errorBanner.style.display = 'flex';
          errorMessage.textContent = data.error || 'Có lỗi xảy ra khi tạo tài khoản.';
          setupBtn.disabled = false;
          setupBtn.textContent = 'Tạo tài khoản Admin';
        }
      } catch (err) {
        console.error('Setup error:', err);
        errorBanner.style.display = 'flex';
        errorMessage.textContent = 'Không thể kết nối đến máy chủ. Vui lòng thử lại sau.';
        setupBtn.disabled = false;
        setupBtn.textContent = 'Tạo tài khoản Admin';
      }
    });
  </script>
</body>
</html>
