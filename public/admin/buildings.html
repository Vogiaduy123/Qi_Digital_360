<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Tòa nhà - Admin</title>
  <script src="/js/admin-runtime-config.js"></script>
  <link rel="stylesheet" href="/css/admin-header.css">
  <link rel="stylesheet" href="/css/admin-rooms.css">
  <style>
    /* ===== BUILDINGS PAGE SPECIFIC ===== */
    .buildings-wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    .buildings-wrap .panel {
      background: rgba(10, 14, 28, 0.78);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,0.34);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .buildings-wrap .panel-header {
      padding: 24px 28px;
      background: linear-gradient(135deg, rgba(43,50,120,0.96), rgba(18,22,45,0.96));
      color: #fff;
    }

    .buildings-wrap .panel-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .buildings-wrap .panel-subtitle {
      color: rgba(232,236,255,0.8);
      font-size: 13px;
    }

    .buildings-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 20px;
    }

    .summary-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #e8ecff;
      font-size: 12px;
      font-weight: 600;
    }

    .summary-chip strong {
      color: #fff;
    }

    .building-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 18px 20px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      box-shadow: 0 12px 32px rgba(0,0,0,0.16);
      margin-bottom: 14px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .building-card:hover {
      box-shadow: 0 18px 42px rgba(0,0,0,0.24);
      transform: translateY(-2px);
      border-color: rgba(125,140,255,0.26);
    }

    .building-card-info {
      min-width: 0;
    }

    .building-card-name {
      font-weight: 700;
      font-size: 16px;
      color: #f3f6ff;
      margin-bottom: 6px;
      word-break: break-word;
    }
    .building-card-meta {
      font-size: 12px;
      color: rgba(232,236,255,0.72);
      line-height: 1.5;
    }
    .building-card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
    }

    .add-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .add-bar input {
      flex: 1;
      min-width: 240px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
      background: rgba(255,255,255,0.06);
      color: #f3f6ff;
    }

    .add-bar input:focus {
      outline: none;
      border-color: #7d8cff;
      box-shadow: 0 0 0 3px rgba(125,140,255,0.12);
      background: rgba(255,255,255,0.08);
    }

    .add-bar input::placeholder {
      color: rgba(232,236,255,0.5);
    }

    .buildings-empty,
    .buildings-error {
      text-align: center;
      padding: 34px 20px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px dashed rgba(255,255,255,0.12);
      color: rgba(232,236,255,0.8);
    }

    .buildings-empty strong,
    .buildings-error strong {
      color: #fff;
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .buildings-error {
      border-style: solid;
      border-color: rgba(255,138,138,0.28);
      background: rgba(255,138,138,0.08);
    }

    /* ===== ASSIGN MODAL ===== */
    .assign-modal-box {
      background: white;
      border-radius: 12px;
      width: 540px;
      max-width: 95vw;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .assign-modal-head {
      padding: 18px 24px;
      border-bottom: 1px solid #e1e8ed;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #2B3278;
      border-radius: 12px 12px 0 0;
    }

    .assign-modal-head h3 {
      margin: 0;
      font-size: 16px;
      color: white;
      font-weight: 600;
    }

    .assign-close-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      color: white;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .assign-close-btn:hover { background: rgba(255,255,255,0.35); }

    .assign-modal-body {
      padding: 16px 20px;
      overflow-y: auto;
      flex: 1;
    }

    .assign-modal-foot {
      padding: 14px 20px;
      border-top: 1px solid #e1e8ed;
      display: flex;
      gap: 10px;
    }

    .select-all-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px 12px;
      border-bottom: 1px solid #e1e8ed;
      margin-bottom: 10px;
    }

    .select-all-bar label {
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: #2B3278;
    }

    .count-badge {
      margin-left: auto;
      background: #e3f2fd;
      color: #1565c0;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
    }

    .room-check-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 4px;
    }

    .room-check-item:hover { background: #f0f4f8; }

    .room-check-item input[type=checkbox] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #2B3278;
      flex-shrink: 0;
    }

    .room-check-label { flex: 1; }
    .room-check-name {
      font-weight: 600;
      font-size: 14px;
      color: #2B3278;
    }
    .room-check-info {
      font-size: 12px;
      color: #7f8c8d;
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mini-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .mini-badge-green  { background: #e8f5e9; color: #27ae60; }
    .mini-badge-orange { background: #fdebd0; color: #e67e22; }
    .mini-badge-gray   { background: #ecf0f1; color: #7f8c8d; }
  </style>
</head>
<body>
  <!-- ===== HEADER ===== -->
  <div class="admin-header" id="adminHeaderMount"></div>
  <script src="/js/admin-nav.js"></script>

  <!-- ===== CONTENT ===== -->
  <div class="buildings-wrap">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">🏢 Quản lý Tòa Nhà / Phân khu</div>
        <div class="panel-subtitle">Tạo và gán các phòng theo từng tòa nhà hoặc phân khu</div>
      </div>
      <div class="panel-body">

        <div class="buildings-summary" id="buildingsSummary">
          <span class="summary-chip">Đang tải dữ liệu...</span>
        </div>

        <div class="add-bar">
          <input type="text" id="newBuildingName" placeholder="Tên tòa nhà mới (VD: Tòa A, Sài Gòn Pearl...)">
          <button class="btn btn-success btn-small" onclick="addBuilding()" style="white-space:nowrap;margin:0;padding:10px 16px;font-size:13px">
            ➕ Thêm Tòa Nhà
          </button>
        </div>

        <div id="buildingsList"></div>

      </div>
    </div>
  </div>

  <!-- ===== MODAL: GÁN PHÒNG ===== -->
  <div class="modal" id="assignModal">
    <div class="assign-modal-box">
      <div class="assign-modal-head">
        <h3 id="assignModalTitle">🏠 Gán phòng vào Tòa nhà</h3>
        <button class="assign-close-btn" onclick="closeAssignModal()">×</button>
      </div>
      <div class="assign-modal-body">
        <div class="select-all-bar">
          <input type="checkbox" id="selectAllRooms" onchange="toggleSelectAll()">
          <label for="selectAllRooms">Chọn tất cả</label>
          <span id="selectedCount" class="count-badge">0 đã chọn</span>
        </div>
        <div id="roomCheckList"></div>
      </div>
      <div class="assign-modal-foot">
        <button class="btn btn-primary" style="flex:1;margin:0" onclick="saveAssignment()">💾 Lưu thay đổi</button>
        <button class="btn" style="flex:1;margin:0;background:#ecf0f1;color:#2B3278" onclick="closeAssignModal()">Hủy</button>
      </div>
    </div>
  </div>

  <script src="/js/admin-buildings.js"></script>
</body>
</html>
