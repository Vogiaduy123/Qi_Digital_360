<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Phân Quyền - Admin</title>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="/js/auth-guard.js"></script>
  <script src="/js/admin-runtime-config.js"></script>
  <script src="/js/admin-api-base.js"></script>
  <link rel="stylesheet" href="/css/admin-header.css">
  <link rel="stylesheet" href="/css/admin-rooms.css">
  <style>
    .users-wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }
    .users-wrap .panel {
      background: #ffffff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,0.08);
    }
    .users-wrap .panel-header {
      padding: 24px 28px;
      background: linear-gradient(135deg, rgba(43,50,120,0.96), rgba(18,22,45,0.96));
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .users-wrap .panel-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .users-wrap .panel-subtitle {
      color: rgba(232,236,255,0.8);
      font-size: 13px;
    }
    .users-table-container {
      padding: 20px;
    }
    .badge-admin {
      background-color: #dc3545;
      color: white;
    }
    .badge-collab {
      background-color: #198754;
      color: white;
    }
    .badge-user {
      background-color: #6c757d;
      color: white;
    }
    .btn-action {
      padding: 4px 10px;
      font-size: 13px;
      border-radius: 8px;
    }
    .modal {
      z-index: 1060 !important;
    }
    .modal-backdrop {
      z-index: 1040 !important;
    }
  </style>
</head>
<body>
  <!-- ===== HEADER ===== -->
  <div class="admin-header" id="adminHeaderMount"></div>
  <script src="/js/admin-nav.js"></script>

  <!-- ===== CONTENT ===== -->
  <div class="users-wrap">
    <div class="panel">
      <div class="panel-header">
        <div>
          <div class="panel-title">👥 Quản lý Phân Quyền Tài khoản</div>
          <div class="panel-subtitle">Thêm tài khoản và cấp quyền cho Admin / Collaborator / User</div>
        </div>
        <button class="btn btn-light btn-sm" onclick="openAddModal()">
          ➕ Thêm tài khoản mới
        </button>
      </div>

      <div class="users-table-container">
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th>ID</th>
                <th>Tên đăng nhập</th>
                <th>Tên hiển thị</th>
                <th>Quyền hạn</th>
                <th>Đăng nhập cuối</th>
                <th class="text-end">Thao tác</th>
              </tr>
            </thead>
            <tbody id="usersList">
              <tr>
                <td colspan="6" class="text-center py-4">Đang tải danh sách tài khoản...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: THÊM TÀI KHOẢN ===== -->
  <div class="modal fade" id="addModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title">👥 Thêm tài khoản mới</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="addUserForm">
          <div class="modal-body">
            <div class="mb-3">
              <label for="addUsername" class="form-label">Tên đăng nhập (username)</label>
              <input type="text" class="form-control" id="addUsername" required autocomplete="username" placeholder="Ví dụ: nhanvien1">
            </div>
            <div class="mb-3">
              <label for="addDisplayName" class="form-label">Tên hiển thị</label>
              <input type="text" class="form-control" id="addDisplayName" required placeholder="Ví dụ: Nguyễn Văn A">
            </div>
            <div class="mb-3">
              <label for="addPassword" class="form-label">Mật khẩu</label>
              <input type="password" class="form-control" id="addPassword" required minlength="6" placeholder="Tối thiểu 6 ký tự">
            </div>
            <div class="mb-3">
              <label for="addRole" class="form-label">Quyền hạn (Role)</label>
              <select class="form-select" id="addRole" required>
                <option value="user">User (Chỉ xem và gửi phản hồi)</option>
                <option value="collaborator">Collaborator (Quản lý tour, upload, minimap)</option>
                <option value="admin">Admin (Tất cả các quyền)</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
            <button type="submit" class="btn btn-primary">Lưu tài khoản</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: SỬA TÀI KHOẢN ===== -->
  <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-dark text-white">
          <h5 class="modal-title">✏️ Chỉnh sửa tài khoản</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="editUserForm">
          <input type="hidden" id="editUserId">
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Tên đăng nhập (username)</label>
              <input type="text" class="form-control" id="editUsername" disabled>
            </div>
            <div class="mb-3">
              <label for="editDisplayName" class="form-label">Tên hiển thị</label>
              <input type="text" class="form-control" id="editDisplayName" required>
            </div>
            <div class="mb-3">
              <label for="editPassword" class="form-label">Mật khẩu mới (để trống nếu không muốn đổi)</label>
              <input type="password" class="form-control" id="editPassword" minlength="6" placeholder="Bỏ trống để giữ nguyên mật khẩu cũ">
            </div>
            <div class="mb-3">
              <label for="editRole" class="form-label">Quyền hạn (Role)</label>
              <select class="form-select" id="editRole" required>
                <option value="user">User</option>
                <option value="collaborator">Collaborator</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
            <button type="submit" class="btn btn-dark">Cập nhật tài khoản</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    let addModal, editModal;
    const API_BASE = window.getAdminApiBase ? window.getAdminApiBase() : '/api/admin';

    document.addEventListener('DOMContentLoaded', () => {
      addModal = new bootstrap.Modal(document.getElementById('addModal'));
      editModal = new bootstrap.Modal(document.getElementById('editModal'));
      loadUsers();

      document.getElementById('addUserForm').addEventListener('submit', handleAddUser);
      document.getElementById('editUserForm').addEventListener('submit', handleEditUser);
    });

    async function loadUsers() {
      try {
        const res = await fetch(`${API_BASE}/users`);
        const data = await res.json();
        
        if (data.success) {
          renderUsers(data.users);
        } else {
          document.getElementById('usersList').innerHTML = `<tr><td colspan="6" class="text-center text-danger">Lỗi: ${data.error}</td></tr>`;
        }
      } catch (err) {
        console.error(err);
        document.getElementById('usersList').innerHTML = `<tr><td colspan="6" class="text-center text-danger">Không thể kết nối đến API.</td></tr>`;
      }
    }

    function renderUsers(users) {
      const tbody = document.getElementById('usersList');
      if (users.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">Không có người dùng nào.</td></tr>`;
        return;
      }

      tbody.innerHTML = users.map(user => {
        let badgeCls = 'badge-user';
        let roleName = 'User';
        if (user.role === 'admin') {
          badgeCls = 'badge-admin';
          roleName = 'Admin';
        } else if (user.role === 'collaborator') {
          badgeCls = 'badge-collab';
          roleName = 'Collaborator';
        }

        const formattedDate = user.last_login 
          ? new Date(user.last_login).toLocaleString('vi-VN') 
          : '<span class="text-muted">Chưa từng đăng nhập</span>';

        const isSelf = window.currentUser && window.currentUser.username === user.username;

        return `
          <tr>
            <td>${user.id}</td>
            <td><strong>${user.username}</strong> ${isSelf ? '<span class="badge bg-primary ms-1">Bạn</span>' : ''}</td>
            <td>${user.displayName || user.username}</td>
            <td><span class="badge ${badgeCls}">${roleName}</span></td>
            <td>${formattedDate}</td>
            <td class="text-end">
              <button class="btn btn-outline-dark btn-action me-1" onclick="openEditModal(${JSON.stringify(user).replace(/"/g, '&quot;')})">✏️ Sửa</button>
              <button class="btn btn-outline-danger btn-action" ${isSelf ? 'disabled title="Không thể tự xóa bản thân"' : ''} onclick="deleteUser(${user.id}, '${user.username}')">🗑️ Xóa</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function openAddModal() {
      document.getElementById('addUserForm').reset();
      addModal.show();
    }

    async function handleAddUser(e) {
      e.preventDefault();
      const username = document.getElementById('addUsername').value.trim();
      const displayName = document.getElementById('addDisplayName').value.trim();
      const password = document.getElementById('addPassword').value;
      const role = document.getElementById('addRole').value;

      try {
        const res = await fetch(`${API_BASE}/users`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, displayName, password, role })
        });
        const data = await res.json();
        if (data.success) {
          addModal.hide();
          loadUsers();
        } else {
          alert('Lỗi: ' + data.error);
        }
      } catch (err) {
        alert('Có lỗi xảy ra.');
      }
    }

    function openEditModal(user) {
      document.getElementById('editUserId').value = user.id;
      document.getElementById('editUsername').value = user.username;
      document.getElementById('editDisplayName').value = user.displayName || user.username;
      document.getElementById('editRole').value = user.role;
      document.getElementById('editPassword').value = '';

      // Khóa đổi role nếu tự sửa role của mình
      const isSelf = window.currentUser && window.currentUser.username === user.username;
      document.getElementById('editRole').disabled = isSelf;

      editModal.show();
    }

    async function handleEditUser(e) {
      e.preventDefault();
      const id = document.getElementById('editUserId').value;
      const displayName = document.getElementById('editDisplayName').value.trim();
      const password = document.getElementById('editPassword').value;
      const role = document.getElementById('editRole').value;

      const body = { displayName };
      if (password) body.password = password;
      if (!document.getElementById('editRole').disabled) {
        body.role = role;
      }

      try {
        const res = await fetch(`${API_BASE}/users/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.success) {
          editModal.hide();
          loadUsers();
        } else {
          alert('Lỗi: ' + data.error);
        }
      } catch (err) {
        alert('Có lỗi xảy ra.');
      }
    }

    async function deleteUser(id, username) {
      if (!confirm(`Bạn có chắc chắn muốn xóa tài khoản "${username}" không? Hành động này không thể hoàn tác.`)) {
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/users/${id}`, {
          method: 'DELETE'
        });
        const data = await res.json();
        if (data.success) {
          loadUsers();
        } else {
          alert('Lỗi: ' + data.error);
        }
      } catch (err) {
        alert('Có lỗi xảy ra.');
      }
    }
  </script>
</body>
</html>
